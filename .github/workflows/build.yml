name: Build Geode Mod

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build clang

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git

      - name: Configure project
        run: |
          export GEODE_SDK=$PWD/geode
          cmake -B build -G Ninja -DGEODE_TARGET_PLATFORM=Win32

      - name: Build
        run: |
          cmake --build build

      - name: Upload mod
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod
          path: build/*.geode
