name: Build Geode Mod

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build clang python3 python3-pip

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git

      - name: Install Geode CLI
        run: |
          git clone https://github.com/geode-sdk/cli.git
          cd cli
          pip3 install .

      - name: Install Geode binaries
        run: |
          geode sdk install-binaries

      - name: Configure
        run: |
          export GEODE_SDK=$PWD/geode
          cmake -B build -G Ninja -DGEODE_TARGET_PLATFORM=Win64

      - name: Build
        run: |
          cmake --build build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod
          path: build/*.geode
